# Server
server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: arremateai-userprofile

  # Database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:arremateai}
    username: ${DB_USERNAME:arremateai}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA (E16-H7: ddl-auto=validate — schema gerido pelo Flyway)
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  # Flyway (E16-H7): tabela de historico dedicada ao userprofile no banco compartilhado
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_userprofile
    baseline-on-migrate: true
    baseline-version: 0

  # Multipart uploads
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:5MB}

# Avatar storage
app:
  userprofile:
    avatar-storage-location: ${AVATAR_STORAGE_PATH:./uploads/avatars}
    base-url: ${USERPROFILE_BASE_URL:}
  internal:
    api-key: ${INTERNAL_API_KEY:}
  # Gateway shared secret — obrigatório em produção (fail-secure: retorna 503 se ausente)
  gateway:
    secret: ${GATEWAY_SHARED_SECRET:}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false
