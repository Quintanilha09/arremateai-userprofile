server.port=8085

# Database - shared PostgreSQL during migration
spring.datasource.url=jdbc:postgresql://localhost:5433/arremateai
spring.datasource.username=${DB_USERNAME:arremateai}
spring.datasource.password=${DB_PASSWORD:arremateai123}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Multipart uploads (avatars max 5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Avatar storage
app.userprofile.avatar-storage-location=./uploads/avatars
app.userprofile.base-url=

# Actuator
management.endpoints.web.exposure.include=health
management.health.mail.enabled=false
