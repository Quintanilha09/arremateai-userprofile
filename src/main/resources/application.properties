# Server
server.port=${SERVER_PORT:8085}
spring.application.name=arremateai-userprofile

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:arremateai}
spring.datasource.username=${DB_USERNAME:arremateai}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Multipart uploads
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:5MB}

# Avatar storage
app.userprofile.avatar-storage-location=${AVATAR_STORAGE_PATH:./uploads/avatars}
app.userprofile.base-url=${USERPROFILE_BASE_URL:}

# Inter-service communication
app.internal.api-key=${INTERNAL_API_KEY:}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false
